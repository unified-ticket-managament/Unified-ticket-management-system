# Unified Render Blueprint for this monorepo.
#
# rbac-backend and ticketing-backend were merged into one service
# (unified-backend/, see that directory's own history for the merge) —
# one process, one port, one dependency set, still against the SAME
# EXTERNAL Neon Postgres database (not Render's own managed Postgres)
# and the same Supabase Storage project both halves already used.
# `sync: false` vars are intentional — paste their values into the
# Render dashboard when you Apply this Blueprint (a few, marked below,
# can't be known until AFTER the first deploy — see DEPLOYMENT.md for
# the full "circular dependency, second pass" runbook).
#
# The two migration chains stay independent on purpose (see
# unified-backend/alembic_rbac/ and .../alembic_ticketing/) — they
# already coexist safely in the same database via two distinct
# version-tracking tables and disjoint table ownership, so the start
# command below runs both `upgrade head` invocations in sequence
# rather than merging their history.

services:
  # ---------------------------------------------------------------------
  # Unified backend — RBAC (sole issuer of auth tokens, owns
  # users/roles/permissions) + Ticketing (owns tickets/interactions/
  # attachments, verifies the JWTs this same process issues), one
  # process now instead of two.
  # ---------------------------------------------------------------------
  - type: web
    name: unified-backend
    runtime: python
    plan: free
    rootDir: unified-backend
    buildCommand: pip install -r requirements.txt
    startCommand: bash scripts/start.sh
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.5
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: "false"
      - key: SECURE_COOKIES
        value: "true"
      - key: LOG_LEVEL
        value: INFO
      # Neon connection string (Neon dashboard -> Connect). Any of
      # postgres:// / postgresql:// / postgresql+asyncpg:// schemes work —
      # normalized automatically, sslmode/channel_binding included.
      - key: DATABASE_URL
        sync: false
      # Sync-driver variant of the same URL, for ticketing's own
      # migration chain (alembic_ticketing/env.py reads this directly;
      # rbac's chain derives its sync URL from DATABASE_URL instead).
      - key: ALEMBIC_DATABASE_URL
        sync: false
      - key: JWT_SECRET_KEY
        sync: false
      - key: JWT_ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "30"
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: "7"
      # SECOND PASS: after first deploy, set to the real unified-frontend URL
      # PLUS the real ticketing-frontend URL (comma-separated, no trailing
      # slash) — both frontends call this one backend cross-origin.
      - key: CORS_ORIGINS
        sync: false
      - key: STORAGE_BACKEND
        value: supabase
      - key: STORAGE_BUCKET
        value: communication-attachments
      - key: STORAGE_URL_EXPIRY_SECONDS
        value: "3600"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      # Shared secret POST /internal/sla/sweep checks against — still
      # needed for the manual-trigger fallback (see the comment above),
      # even though the in-process scheduler below doesn't go over HTTP
      # and so doesn't need this secret itself. Must stay byte-identical
      # to the SLA_SWEEP_SHARED_SECRET repo secret in
      # .github/workflows/sla-sweep.yml.
      - key: SLA_SWEEP_SHARED_SECRET
        sync: false
      # How often app/core/sla_scheduler.py's in-process APScheduler
      # job calls SLASweepService.run_sweep(). Plain value, not a
      # secret — override here if a deployed environment ever needs a
      # different cadence than the app's own default.
      - key: SLA_SWEEP_INTERVAL_MINUTES
        value: "1"
      # Microsoft Graph mail integration (app/ticketing/services/
      # graph_client.py, graph_auth.py, graph_subscription_service.py).
      # All five optional — get_mail_provider_client() falls back to
      # MockMailProviderClient and the subscription scheduler no-ops
      # whenever any of these is unset, so leaving them unset here is
      # safe and keeps the existing mocked behavior. See
      # AZURE_SETUP_GUIDE.md for how to obtain each value.
      - key: GRAPH_TENANT_ID
        sync: false
      - key: GRAPH_CLIENT_ID
        sync: false
      - key: GRAPH_CLIENT_SECRET
        sync: false
      - key: GRAPH_MAILBOX_ADDRESS
        sync: false
      # App-generated anti-spoofing secret verified against every Graph
      # webhook notification's own clientState — not something Azure
      # issues, generate a random 32+ character value.
      - key: GRAPH_WEBHOOK_CLIENT_STATE
        sync: false
      # SECOND PASS: this service's own real Render URL + /api/mail/incoming
      # (e.g. https://unified-backend-xxxx.onrender.com/api/mail/incoming) —
      # only knowable after first deploy, same "second pass" pattern as
      # CORS_ORIGINS/NEXT_PUBLIC_API_URL above. Only used for Graph
      # subscription creation/renewal; leave unset until then.
      - key: GRAPH_WEBHOOK_NOTIFICATION_URL
        sync: false

  # ---------------------------------------------------------------------
  # There used to be a `type: cron` "sla-sweep" service here (Render
  # Cron Jobs require a paid plan, this Blueprint is on the free tier),
  # then a free GitHub Actions scheduled-workflow replacement
  # (.github/workflows/sla-sweep.yml). Both are gone/disabled now — the
  # sweep runs in-process inside unified-backend itself instead
  # (app/core/sla_scheduler.py, an APScheduler job started from
  # app/main.py's lifespan, interval set by SLA_SWEEP_INTERVAL_MINUTES
  # below), so no separate scheduling service/workflow is needed at
  # all. The GitHub Actions workflow file is kept, `schedule` trigger
  # removed, as a manual/emergency-only fallback.
  # ---------------------------------------------------------------------

  - type: web
    name: unified-frontend
    runtime: node
    plan: free
    # Directory renamed to unified-frontend/ (formerly rbac-service/frontend)
    # once it was confirmed to already be a strict superset of
    # ticketing-service/frontend — see the root CLAUDE.md's frontend-
    # consolidation note. Service `name` was originally kept as `rbac-frontend`
    # to avoid a URL/hostname change on Render, but was deliberately renamed
    # to `unified-frontend` while still pre-launch (no external users/links
    # depending on the old URL yet) — renaming a Render service's name here
    # mints a fresh service/URL on next Blueprint sync rather than renaming
    # in place, so the old `rbac-frontend` service becomes unmanaged and
    # should be suspended/deleted once the new one is verified working.
    rootDir: unified-frontend
    buildCommand: npm ci && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_VERSION
        value: 20.18.0
      # SECOND PASS: real unified-backend URL + /api/v1. NEXT_PUBLIC_* vars
      # are baked in at build time — after setting this, trigger a manual
      # rebuild, saving the env var alone does nothing.
      - key: NEXT_PUBLIC_API_URL
        sync: false
      # SECOND PASS: real ticketing-frontend URL — the embedded Ticket
      # Workspace's "open in Ticketing's own app" link.
      - key: NEXT_PUBLIC_TICKETING_FRONTEND_URL
        sync: false
      # SECOND PASS: same unified-backend URL as NEXT_PUBLIC_API_URL
      # above, but WITHOUT the /api/v1 suffix — ticketing's routes are
      # unprefixed on that same origin. Base URL the embedded
      # ticket-workspace (src/ticket-workspace) talks to directly.
      - key: NEXT_PUBLIC_TICKETING_API_URL
        sync: false

  - type: web
    name: ticketing-frontend
    runtime: static
    # No `plan` field here — static sites have no compute dyno/tier (Render
    # serves them free off a CDN), and Render rejects `plan: free` for
    # runtime: static specifically. `plan: free` IS required on the `type:
    # web` services above, but NOT valid on this static site or the
    # `sla-sweep` cron job — three service types, two different reasons to
    # omit it, don't assume the field is optional everywhere by pattern-
    # matching off this comment.
    rootDir: ticketing-service/frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NODE_VERSION
        value: 20.18.0
      # SECOND PASS: real unified-backend URL (no /api/v1 suffix — see
      # NEXT_PUBLIC_TICKETING_API_URL's note above, same origin). Vite
      # bakes VITE_* vars in at build time — trigger a manual rebuild
      # after setting this.
      - key: VITE_API_BASE_URL
        sync: false
      # SECOND PASS: same unified-backend URL, WITH /api/v1 — used for
      # the unified login flow (this frontend authenticates against the
      # backend's RBAC half directly).
      - key: VITE_RBAC_API_BASE_URL
        sync: false
      # SECOND PASS: real unified-frontend URL — sidebar's "RBAC Admin" link.
      - key: VITE_RBAC_FRONTEND_URL
        sync: false
