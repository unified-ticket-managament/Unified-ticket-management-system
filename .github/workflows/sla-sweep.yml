name: SLA Sweep

# Replaces the Render Cron Job approach (render.yaml's old `sla-sweep`
# service) — Render Cron Jobs require a paid plan; this hits the same
# shared-secret-protected POST /internal/sla/sweep on unified-backend
# for free, via GitHub's own scheduler.
#
# Required repo secrets (Settings -> Secrets and variables -> Actions):
#   SLA_SWEEP_URL             — unified-backend's real root URL +
#                               /internal/sla/sweep (no /api/v1)
#   SLA_SWEEP_SHARED_SECRET   — must be byte-identical to
#                               unified-backend's own env var of the
#                               same name
#
# GitHub does not guarantee exact timing on `schedule` triggers (its
# own docs: runs "may be delayed during periods of high load") — 5
# minutes is the practical floor for reliability, not a hard platform
# minimum. Tighten only if you've confirmed runs are landing close to
# on-time; going below ~5 minutes risks skipped/coalesced runs under
# GitHub's own scheduling load.

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: {} # manual "Run workflow" button, for on-demand testing

jobs:
  sweep:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger SLA breach-detection sweep
        run: |
          http_status=$(curl -s -o /tmp/sweep_response.json -w "%{http_code}" \
            -X POST "${{ secrets.SLA_SWEEP_URL }}" \
            -H "X-SLA-Sweep-Secret: ${{ secrets.SLA_SWEEP_SHARED_SECRET }}")

          echo "HTTP status: $http_status"
          cat /tmp/sweep_response.json

          if [ "$http_status" -lt 200 ] || [ "$http_status" -ge 300 ]; then
            echo "::error::SLA sweep request failed with status $http_status"
            exit 1
          fi
